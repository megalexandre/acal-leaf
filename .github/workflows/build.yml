name: Build e Upload Artefatos

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Upload JAR artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: jar-artifacts
        path: |
          **/target/*.jar
          **/target/*.war
        retention-days: 30

    - name: Upload Build Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-reports
        path: |
          **/target/surefire-reports/
          **/target/site/
        retention-days: 7


