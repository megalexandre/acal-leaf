name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Get version from tag
      id: version
      run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          **/target/*.jar
          **/target/*.war
        body: |
          ## Build Artifacts
          
          Artefatos de build para versão ${{ steps.version.outputs.version }}
          
          ### Módulos
          - **acal-left-app**: Aplicação principal
          - **acal-left-ui**: Interface gráfica
          - **acal-left-core**: Lógica de negócio
          - **acal-left-persistence**: Acesso a dados
          - **acal-left-shared**: Componentes compartilhados
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

