name: CI/CD Acal-Left

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-pack:
    name: Build & Pack
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package -DskipTests

      - name: Create Windows Installer (jpackage)
        shell: pwsh
        run: |
          $RAW_VERSION = "${{ github.ref_name }}"
          $CLEAN_VERSION = $RAW_VERSION -replace '^v', ''
          
          jpackage --type exe `
            --dest dist/ `
            --name "Acal" `
            --input acal-left-app/target/ `
            --main-jar acal-left-app-0.0.1-SNAPSHOT.jar `
            --main-class acal.com.acal_left.AcalLeftApplication `
            --win-shortcut `
            --win-menu `
            --vendor "Alexandre" `
            --app-version $CLEAN_VERSION

          New-Item -ItemType Directory -Path "release_assets"
          Move-Item "dist/*.exe" "release_assets/Acal-$CLEAN_VERSION.exe"
          Copy-Item "acal-left-app/target/acal-left-app-0.0.1-SNAPSHOT.jar" -Destination "release_assets/Acal-$CLEAN_VERSION.jar"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: acal-release-pack
          path: release_assets/

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build-and-pack
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: acal-release-pack
          path: final_assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Acal ${{ github.ref_name }}
          files: |
            final_assets/*.exe
            final_assets/*.jar